<!DOCTYPE html>
<html>
<head>
    <title>Pathfinder AI</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">

    <h1>🚀 Pathfinder AI</h1>

    <div class="card">

        <label>Enter Your Skills</label>
        <input type="text" id="skills" placeholder="e.g. sql, python">

        <label>Select Target Role</label>
        <select id="role">
            <option>Data Analyst</option>
            <option>Web Developer</option>
            <option>DevOps Engineer</option>
            <option>Java Developer</option>
            <option>Python Developer</option>
            <option>ServiceNow Developer</option>
            <option>Banking/Non-IT</option>
        </select>

        <button onclick="analyze()">Analyze</button>

    </div>

    <div class="result-card">
        <h2>Result</h2>
        <div id="output"></div>
    </div>
    
    <div class="feedback-section">

    <button onclick="toggleFeedback()">Give Feedback</button>

    <div id="feedbackForm" class="feedback-form" style="display:none;">

        <h3>Feedback / Suggestions</h3>

        <form action="https://formspree.io/f/mojykzwz" method="POST">

            <label>Your Name</label>
            <input type="text" name="name" required>

            <label>Your Email</label>
            <input type="email" name="email" required>

            <label>Your Feedback</label>
            <textarea name="message" rows="4" required></textarea>

            <button type="submit">Submit Feedback</button>

        </form>
    </div>

</div>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
